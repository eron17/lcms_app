name: lcms_app
description: Interactive LCMS for C++ Programming - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── File Handling (Critical) ───────────────────────────────
  file_picker: ^8.1.2
  open_filex: ^4.3.4
  path_provider: ^2.1.2
  local_auth: ^2.3.0   

  # ─── Firebase / Backend ─────────────────────────────────────
  supabase_flutter: ^2.8.4

  # ─── State Management ───────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─── Navigation ─────────────────────────────────────────────
  go_router: ^14.2.7

  # ─── Networking / API ───────────────────────────────────────
  dio: ^5.7.0
  http: ^1.2.2

  # ─── UI Components ──────────────────────────────────────────
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # ─── Media / Content ────────────────────────────────────────
  video_player: ^2.9.1
  chewie: ^1.8.5
  syncfusion_flutter_pdfviewer: ^27.1.48
  photo_view: ^0.15.0

  # ─── Gamification ───────────────────────────────────────────
  confetti: ^0.7.0

  # ─── Local Storage / Cache ──────────────────────────────────
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # ─── Utilities ──────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.0
  timeago: ^3.7.0

  # ─── Icons ──────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  phosphor_flutter: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
